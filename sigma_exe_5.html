<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Layout </title>


    <style>
        * {
            padding: 0;
            margin: 0;

        }

        nav {
            background-color: aqua;
            height: 53px;

        }

        header {
            position: sticky;
            top: 0;
        }

        main {
            background-color: white;
        }

        .cont {
            background-color: green;
            margin: 12px 34px;
            /* height: 233px; */
            display: flex;
            text-align: center;
        }

        .box1 {
            background-color: palevioletred;
            padding: 94px;
            margin: 24px 24px;
            height: 30vh;
            width: 50%;

        }

        .box2 {
            background-color: blueviolet;
            padding: 94px;
            margin: 24px 24px;
            height: 30vh;
            width: 50%;


        }

        footer {
            background-color: blue;
            height: 60px;
        }

        .textbox {
            border: 2px solid white;
            border-radius: 15px;
            margin: 20px;
            padding: 20px;
            text-align: center;
            background-color: black;
            color: white;

        }

        ul {
            display: flex;



        }

        li {
            margin: 15px;
            list-style-type: none;
        }

        .circle {
            height: 34px;
            width: 34px;
            background-color: orange;
            position: fixed;
            bottom: 60px;
            right: 23px;
            border-radius: 60px;
        }

       
    </style>

</head>


<body>

    <header>
        <nav>
            <ul>
                <li>HOME</li>
                <li>ABOUT</li>
                <li>SERVICES</li>
                <li>CONTACT</li>

            </ul>
        </nav>
    </header>

    <main>
        <div class="cont">
            <div class="box1"></div>
            <div class="box2"></div>

        </div>
        <div class="textbox">
            <p>WELCOME TO SIGMA WEB DEVLOPMENT COURSE</p>

        </div>

        <div class="circle">

        </div>

    </main>

    <footer>

    </footer>

</body>

</html>
